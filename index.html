<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impressum – pawfectbuddies__</title>
<style>
  * {
    box-sizing: border-box;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 0;
    padding: 60px 20px;
    background: linear-gradient(135deg, #fdf6f0 0%, #f7efe6 100%);
    color: #3a3a3a;
    min-height: 100vh;
    display: flex;
    justify-content: center;
  }
  .card {
    max-width: 480px;
    width: 100%;
    background: #ffffff;
    border-radius: 18px;
    padding: 48px 40px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
  }
  .icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    background: linear-gradient(135deg, #e0a96d, #c97b3d);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
  }
  .icon svg {
    width: 24px;
    height: 24px;
    stroke: white;
  }
  h1 {
    font-size: 1.7em;
    font-weight: 700;
    margin: 0 0 32px 0;
    letter-spacing: -0.5px;
  }
  .block {
    margin-bottom: 28px;
  }
  .label {
    font-size: 0.75em;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #c97b3d;
    margin: 0 0 8px 0;
  }
  p {
    margin: 0;
    line-height: 1.6;
    color: #444;
  }
  a {
    color: #c97b3d;
    text-decoration: none;
    font-weight: 500;
  }
  a:hover {
    text-decoration: underline;
  }
  .footer {
    margin-top: 36px;
    padding-top: 20px;
    border-top: 1px solid #eee;
    font-size: 0.78em;
    color: #aaa;
  }
</style>
</head>
<body>

<div class="card">
  <div class="icon">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
      <polyline points="14 2 14 8 20 8"></polyline>
      <line x1="16" y1="13" x2="8" y2="13"></line>
      <line x1="16" y1="17" x2="8" y2="17"></line>
    </svg>
  </div>

  <h1>Impressum</h1>

  <div class="block">
    <p class="label">Name &amp; Anschrift</p>
    <p>Martina Kuppinger<br>
    Clara-Schumann-Str. 1<br>
    71101 Schönaich</p>
  </div>

  <div class="block">
    <p class="label">Kontakt</p>
    <p>E-Mail: <a href="mailto:martina.kalus@online.de">martina.kalus@online.de</a></p>
  </div>

  <div class="footer">
    Instagram: &middot; pawfectbuddies__ &middot;
  </div>
</div>

</body>
</html>
